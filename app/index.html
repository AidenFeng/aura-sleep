  <body>
    <div id="root"></div>
    <script>
      // Decode the SPA fallback hop set by 404.html so deep links work
      // on GitHub Pages.
      (function () {
        var qs = new URLSearchParams(window.location.search);
        var p = qs.get('p');
        if (p) {
          qs.delete('p');
          var rest = qs.toString();
          var base = window.location.pathname.replace(/\/$/, '');
          window.history.replaceState(null, '', base + p + (rest ? '?' + rest : ''));
        }
      })();
    </script>
